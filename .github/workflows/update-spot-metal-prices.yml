name: Update Spot Metal Prices

permissions:
  contents: write

on:
  schedule:
    # Ogni 30 minuti.
    # GitHub usa UTC, ma i minuti :07 e :37 sono uguali anche in Italia.
    # L'orario scritto nel CSV viene convertito in Europe/Rome da Python.
    - cron: "7,37 * * * *"
  workflow_dispatch:

concurrency:
  group: update-spot-metal-prices
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      METAL_API_KEY: ${{ secrets.METAL_PRICE_API_KEY }}
      GH_TOKEN: ${{ github.token }}
      GH_REPOSITORY: ${{ github.repository }}
      DEFAULT_BRANCH: main
      OUTPUT_FILE: spot_metal_prices.csv

    steps:
      - name: Install Python dependencies
        shell: bash
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install requests

      - name: Fetch spot prices and update CSV safely
        shell: bash
        run: |
          python3 << 'PYTHON_SCRIPT'
          import base64
          import csv
          import io
          import json
          import os
          import sys
          import time
          import urllib.error
          import urllib.parse
          import urllib.request
          from datetime import datetime
          from decimal import Decimal, InvalidOperation, ROUND_HALF_UP
          from zoneinfo import ZoneInfo

          import requests


          METAL_API_KEY = os.environ.get("METAL_API_KEY")
          GH_TOKEN = os.environ.get("GH_TOKEN")
          GH_REPOSITORY = os.environ.get("GH_REPOSITORY")
          DEFAULT_BRANCH = os.environ.get("DEFAULT_BRANCH") or "main"
          OUTPUT_FILE = os.environ.get("OUTPUT_FILE") or "spot_metal_prices.csv"

          METAL_API_URL = "https://api.metalpriceapi.com/v1/latest"
          GITHUB_API_URL = f"https://api.github.com/repos/{GH_REPOSITORY}/contents/{OUTPUT_FILE}"

          OZ_TO_G = Decimal("31.1035")
          CSV_FIELDS = ["datetime", "gold_eur_per_g", "silver_eur_per_g"]


          def log(message):
              print(message, flush=True)


          def stop_successfully(message):
              """
              Usato quando l'API non risponde o restituisce dati non validi.
              Il workflow resta verde e il CSV rimane con l'ultimo valore valido.
              """
              log("")
              log("NO UPDATE PERFORMED")
              log(message)
              log("The existing CSV has been left unchanged.")
              sys.exit(0)


          def fail_configuration(message):
              """
              Usato solo per problemi di configurazione GitHub/segreti/permessi.
              Questi devono essere visibili come errore reale.
              """
              print(f"ERROR: {message}", file=sys.stderr)
              sys.exit(1)


          def to_decimal(value, label):
              try:
                  return Decimal(str(value))
              except (InvalidOperation, TypeError):
                  stop_successfully(f"Invalid decimal value for {label}: {value!r}")


          def fetch_metal_rates():
              if not METAL_API_KEY:
                  fail_configuration("Missing repository secret METAL_PRICE_API_KEY.")

              params = {
                  "api_key": METAL_API_KEY,
                  "base": "USD",
                  "currencies": "EUR,XAU,XAG",
              }

              headers = {
                  "User-Agent": "Mozilla/5.0 (compatible; GitHubActionsMetalPrices/1.0)",
                  "Accept": "application/json,text/plain,*/*",
                  "Connection": "close",
              }

              log("Calling Metal Price API...")

              try:
                  response = requests.get(
                      METAL_API_URL,
                      params=params,
                      headers=headers,
                      timeout=30,
                  )
              except requests.RequestException as exc:
                  stop_successfully(f"Metal Price API network/timeout error: {exc}")

              log(f"Metal Price API HTTP status: {response.status_code}")

              try:
                  data = response.json()
              except ValueError:
                  data = response.text

              if response.status_code != 200:
                  log("Metal Price API response:")
                  log(str(data))
                  stop_successfully(
                      f"Metal Price API returned HTTP {response.status_code}. "
                      "Skipping CSV update."
                  )

              if not isinstance(data, dict):
                  log("Metal Price API response:")
                  log(str(data))
                  stop_successfully("Metal Price API did not return a JSON object.")

              log(f"Metal Price API success: {data.get('success')}")
              log(f"Metal Price API base: {data.get('base')}")

              if not data.get("success"):
                  log("Metal Price API response:")
                  log(str(data))
                  stop_successfully("Metal Price API returned success=false.")

              rates = data.get("rates")

              if not isinstance(rates, dict):
                  log("Metal Price API response:")
                  log(str(data))
                  stop_successfully("Metal Price API response does not contain a valid rates object.")

              for key in ["EUR", "XAU", "XAG"]:
                  if key not in rates:
                      log(f"Available rate keys: {sorted(rates.keys())}")
                      stop_successfully(f"Missing {key} in Metal Price API response.")

              log(f"Raw EUR: {rates['EUR']}")
              log(f"Raw XAU: {rates['XAU']}")
              log(f"Raw XAG: {rates['XAG']}")

              return rates


          def metal_eur_per_gram(rates, metal_code):
              eur_per_usd = to_decimal(rates["EUR"], "EUR")
              metal_oz_per_usd = to_decimal(rates[metal_code], metal_code)

              if eur_per_usd <= 0:
                  stop_successfully("EUR rate is zero or negative. Skipping CSV update.")

              if metal_oz_per_usd <= 0:
                  stop_successfully(f"{metal_code} rate is zero or negative. Skipping CSV update.")

              usd_per_oz = Decimal("1") / metal_oz_per_usd
              eur_per_oz = usd_per_oz * eur_per_usd

              eur_per_g = (eur_per_oz / OZ_TO_G).quantize(
                  Decimal("0.0001"),
                  rounding=ROUND_HALF_UP,
              )

              log(f"{metal_code} USD/oz: {usd_per_oz}")
              log(f"{metal_code} EUR/oz: {eur_per_oz}")
              log(f"{metal_code} EUR/g: {eur_per_g}")

              return eur_per_g


          def sanity_check(gold_eur_per_g, silver_eur_per_g):
              if not Decimal("10") <= gold_eur_per_g <= Decimal("300"):
                  stop_successfully(
                      f"Gold EUR/g value looks abnormal: {gold_eur_per_g}. "
                      "Skipping CSV update."
                  )

              if not Decimal("0.1") <= silver_eur_per_g <= Decimal("20"):
                  stop_successfully(
                      f"Silver EUR/g value looks abnormal: {silver_eur_per_g}. "
                      "Skipping CSV update."
                  )


          def build_csv(datetime_str, gold_eur_per_g, silver_eur_per_g):
              buffer = io.StringIO()

              writer = csv.DictWriter(
                  buffer,
                  fieldnames=CSV_FIELDS,
                  lineterminator="\n",
              )

              writer.writeheader()
              writer.writerow({
                  "datetime": datetime_str,
                  "gold_eur_per_g": str(gold_eur_per_g),
                  "silver_eur_per_g": str(silver_eur_per_g),
              })

              return buffer.getvalue()


          def github_headers():
              if not GH_TOKEN:
                  fail_configuration("Missing GitHub token.")

              return {
                  "Authorization": f"Bearer {GH_TOKEN}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "Content-Type": "application/json",
                  "User-Agent": "spot-metal-prices-updater",
              }


          def http_json_request(url, method="GET", headers=None, body=None):
              request = urllib.request.Request(
                  url=url,
                  method=method,
                  headers=headers or {},
                  data=body,
              )

              try:
                  with urllib.request.urlopen(request, timeout=30) as response:
                      raw = response.read().decode("utf-8")
                      if not raw:
                          return None, response.status
                      return json.loads(raw), response.status

              except urllib.error.HTTPError as error:
                  raw = error.read().decode("utf-8", errors="replace")
                  try:
                      parsed = json.loads(raw)
                  except json.JSONDecodeError:
                      parsed = raw

                  return {
                      "_http_error": True,
                      "status": error.code,
                      "body": parsed,
                  }, error.code

              except urllib.error.URLError as error:
                  fail_configuration(f"Network error during GitHub API request: {error}")


          def get_existing_file():
              url = f"{GITHUB_API_URL}?ref={urllib.parse.quote(DEFAULT_BRANCH)}"

              data, status = http_json_request(
                  url,
                  method="GET",
                  headers=github_headers(),
              )

              if status == 404:
                  log(f"{OUTPUT_FILE} does not exist yet. It will be created.")
                  return None, None

              if status != 200:
                  log("GitHub API response while reading file:")
                  log(str(data))
                  fail_configuration(f"Could not read {OUTPUT_FILE} from GitHub.")

              sha = data.get("sha")
              encoded_content = data.get("content", "")
              encoding = data.get("encoding")

              existing_text = None

              if encoded_content and encoding == "base64":
                  compact_content = encoded_content.replace("\n", "")
                  existing_text = base64.b64decode(compact_content).decode("utf-8")

              return sha, existing_text


          def put_file(csv_text, sha):
              payload = {
                  "message": "Update spot metal prices",
                  "content": base64.b64encode(csv_text.encode("utf-8")).decode("ascii"),
                  "branch": DEFAULT_BRANCH,
              }

              if sha:
                  payload["sha"] = sha

              body = json.dumps(payload).encode("utf-8")

              data, status = http_json_request(
                  GITHUB_API_URL,
                  method="PUT",
                  headers=github_headers(),
                  body=body,
              )

              return data, status


          def update_csv_on_github(csv_text):
              for attempt in range(1, 6):
                  log(f"GitHub file update attempt {attempt}/5...")

                  sha, existing_text = get_existing_file()

                  if existing_text == csv_text:
                      log(f"{OUTPUT_FILE} is already up to date. No commit needed.")
                      return

                  data, status = put_file(csv_text, sha)

                  if status in (200, 201):
                      commit_sha = None

                      if isinstance(data, dict):
                          commit_sha = data.get("commit", {}).get("sha")

                      log(f"{OUTPUT_FILE} updated successfully.")
                      log(f"Commit SHA: {commit_sha}")
                      return

                  if status == 409:
                      log("GitHub API conflict detected. Retrying with latest file SHA...")
                      time.sleep(2)
                      continue

                  log("GitHub API response while updating file:")
                  log(str(data))
                  fail_configuration(f"Could not update {OUTPUT_FILE}. HTTP status: {status}")

              fail_configuration(f"Could not update {OUTPUT_FILE} after 5 attempts.")


          def main():
              log(f"Repository: {GH_REPOSITORY}")
              log(f"Branch: {DEFAULT_BRANCH}")
              log(f"Output file: {OUTPUT_FILE}")
              log(f"Event trigger handled by GitHub Actions schedule/workflow_dispatch.")

              rates = fetch_metal_rates()

              gold_eur_per_g = metal_eur_per_gram(rates, "XAU")
              silver_eur_per_g = metal_eur_per_gram(rates, "XAG")

              sanity_check(gold_eur_per_g, silver_eur_per_g)

              now_rome = datetime.now(ZoneInfo("Europe/Rome")).replace(
                  second=0,
                  microsecond=0,
              )

              datetime_str = now_rome.strftime("%Y-%m-%d %H:%M:%S")

              csv_text = build_csv(
                  datetime_str=datetime_str,
                  gold_eur_per_g=gold_eur_per_g,
                  silver_eur_per_g=silver_eur_per_g,
              )

              log("")
              log("Generated CSV:")
              log(csv_text)

              update_csv_on_github(csv_text)


          if __name__ == "__main__":
              main()
          PYTHON_SCRIPT
